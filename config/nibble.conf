# Enable Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Nice OLED
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=n
CONFIG_ZMK_HID_INDICATORS=n
CONFIG_NICE_OLED_WIDGET_LAYER=n
CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT=n

# Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=304
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=83

# Power management
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=0
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y